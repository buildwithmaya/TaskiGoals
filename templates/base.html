<!DOCTYPE html>

<html>

    <head>  
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <link href="/static/styles.css" rel="stylesheet">   
        {% block head %} {% endblock %}  
        
        
    </head>

    <body>
        {% if session.get('user_id') %}
        <header>

            <!--sidebar--> 
            <div class="sidebar">
               <h2>TaskiGoals</h2>
              
               
                   
                   <a href="{{ url_for('index') }}">Tasks</a>  
                   <a href="{{ url_for('search') }}">Search</a>        
                   <a href="{{ url_for('inbox') }}">Inbox</a>
                   <a href="{{ url_for('today') }}">Today</a>
                   <a href="{{ url_for('upcoming') }}">Upcoming</a>
                   <a href="{{ url_for('completed') }}">Completed</a>
                   <a href="{{ url_for('myProjects') }}">Projects</a>
                   <hr style="border-color: rgba(255,255,255,0.3);">
                   <a href="{{ url_for('logout') }}" style="color: #ff6b6b;">Logout ({{ session.get('username') }})</a>
                   
                             
           </div>
       </header>
        {% endif %}

        {% block body %} {% endblock %}  

        <footer class="footer">
            <p>&copy; 2025 TaskiGoals. All rights reserved.</p>
        </footer> 
    </body>

</html>
