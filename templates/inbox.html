{% extends "base.html" %}

{% block head %}
    <title>Inbox</title>
{% endblock %}

{% block body %}
<main class="main">
    <h2 class="mainmain">Inbox</h2>
    {% if view %}
        <table class="inbox-list">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for todo in view %}
                <tr>
                    <td>{{ todo[0] }}</td>
                    <td>{{ todo[1] }}</td>
                    <td>{{ todo[2] }}</td>
                    <td>{{ todo[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No inbox tasks yet.</p>
    {% endif %}
</main>
{% endblock %}
